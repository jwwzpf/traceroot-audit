name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Launch acceptance
        run: pnpm launch:acceptance

      - name: Build
        run: pnpm build

      - name: Check package contents
        run: pnpm package:check

      - name: Create tarball
        id: pack
        run: |
          rm -f traceroot-audit-*.tgz
          npm pack --cache .npm > /dev/null
          PACKAGE_FILE=$(find . -maxdepth 1 -name 'traceroot-audit-*.tgz' -print | sed 's|^\./||' | head -n 1)
          if [ -z "$PACKAGE_FILE" ]; then
            echo "Could not find generated tarball" >&2
            exit 1
          fi
          echo "package_file=${PACKAGE_FILE}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish --access public --cache .npm

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.pack.outputs.package_file }}
